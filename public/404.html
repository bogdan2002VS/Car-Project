<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MX-5 Encyclopedia</title>
    <!-- spa-github-pages: redirect deep links to index so React Router can handle them -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1 // keep the /Car-Project/ project-pages segment
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
