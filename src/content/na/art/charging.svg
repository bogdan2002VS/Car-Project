<svg viewBox="0 0 1000 600" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <!-- +12V battery bus (highlighted red) -->
  <g stroke="#C71530" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M150 525 L150 575 L875 575" />
    <path d="M370 575 L370 335" />
    <path d="M645 575 L645 530" />
    <path d="M875 575 L875 230" />
  </g>
  <!-- control / signal wiring -->
  <g stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M370 255 L370 140 L520 140" />
    <path d="M690 140 L800 150" />
    <path d="M645 410 L645 360 L435 360 L435 335" />
    <path d="M70 460 L40 460 L40 520" />
  </g>
  <!-- ground symbol -->
  <g stroke="currentColor" stroke-width="3">
    <path d="M22 520 L58 520 M30 532 L50 532 M36 544 L44 544" />
  </g>
  <!-- component boxes -->
  <g stroke="currentColor" stroke-width="3" fill="none">
    <rect x="70" y="405" width="160" height="120" rx="8" />
    <rect x="305" y="255" width="130" height="80" rx="8" />
    <rect x="520" y="95" width="170" height="90" rx="8" />
    <rect x="800" y="110" width="150" height="120" rx="10" />
    <rect x="560" y="410" width="170" height="120" rx="10" />
  </g>
  <!-- alternator coil hint -->
  <g stroke="currentColor" stroke-width="2.5" fill="none" opacity="0.7">
    <circle cx="645" cy="470" r="34" />
  </g>
  <!-- terminal dots -->
  <g fill="#C71530">
    <circle cx="150" cy="525" r="6" />
    <circle cx="370" cy="335" r="6" />
    <circle cx="645" cy="530" r="6" />
    <circle cx="875" cy="230" r="6" />
  </g>
  <!-- labels (placed above each box so hotspot markers stay clear) -->
  <g fill="currentColor" font-size="22" font-weight="700" text-anchor="middle">
    <text x="150" y="395">BATT 12V</text>
    <text x="370" y="245">MAIN FUSE</text>
    <text x="605" y="85">IGNITION SW</text>
    <text x="875" y="100">STARTER</text>
    <text x="645" y="400">ALT</text>
  </g>
  <g fill="currentColor" font-size="15" text-anchor="middle" opacity="0.7">
    <text x="120" y="600">+12V</text>
    <text x="470" y="130">IG1</text>
    <text x="760" y="135">ST</text>
  </g>
</svg>
